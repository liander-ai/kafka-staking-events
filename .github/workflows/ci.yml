name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: maven test (Testcontainers Kafka)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B test
